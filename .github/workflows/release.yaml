name: Manuelles Release (vorhandene Assets + optionale Ordner)

on:
  workflow_dispatch:
    inputs:
      changelog:
        description: "Changelog-Text für dieses Release"
        required: true
        type: string
      draft:
        description: "Als Entwurf erstellen?"
        required: false
        type: boolean
        default: false
      prerelease:
        description: "Als Pre-Release markieren?"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Repository vollständig auschecken
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Projektname und Zeitstempel ermitteln
        id: meta
        run: |
          PROJECT_NAME="${{ github.event.repository.name }}"
          TIMESTAMP="$(date -u +'%Y%m%d-%H%M%S')"
          TAG_NAME="${PROJECT_NAME}-${TIMESTAMP}"
          echo "project_name=$PROJECT_NAME" >> "$GITHUB_OUTPUT"
          echo "timestamp=$TIMESTAMP" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"

      - name: Vorhandene Assets suchen
        run: |
          set -e
          find . -type f \( \
              -iname "*.wdx" -o -iname "*.wcx" -o -iname "*.wfx" -o -iname "*.wlx" \
              -o -iname "*.wdx64" -o -iname "*.wcx64" -o -iname "*.wfx64" -o -iname "*.wlx64" \
              -o -iname "*.exe" -o -iname "*32.exe" -o -iname "*64.exe" \
              -o -iname "*.zip" \
              -o -iname "readme*" \
              -o -iname "license*" -o -iname "lizenz*" \
            \) ! -path "./.git/*" \
              ! -path "./src/*" \
              ! -path "./source/*" \
              ! -path "./DLL/*" \
              ! -path "./standalone/*" \
            > assets.txt

          if [ ! -s assets.txt ]; then
            echo "Keine passenden Dateien im Repository gefunden – Abbruch." >&2
            exit 1
          fi
          cat assets.txt

      - name: Optionale Ordner archivieren (source, DLL, standalone)
        run: |
          : > folder_assets.txt
          TAG="${{ steps.meta.outputs.tag_name }}"
          for NAME in src source DLL standalone; do
            DIR=$(find . -maxdepth 1 -iname "$NAME" -type d | head -n 1)
            if [ -n "$DIR" ]; then
              ZIPNAME="${TAG}-${NAME}.zip"
              (cd "$DIR" && zip -r "../$ZIPNAME" .)
              echo "$ZIPNAME" >> folder_assets.txt
            else
              echo "Ordner '$NAME' nicht vorhanden (auch case-insensitive geprüft), überspringe."
            fi
          done

      - name: Release-Notes zusammenbauen
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHANGELOG: ${{ inputs.changelog }}
        run: |
          AUTO_NOTES=$(gh api --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/releases/generate-notes" \
            -f tag_name="${{ steps.meta.outputs.tag_name }}" \
            --jq .body 2>/dev/null || echo "")

          {
            echo "$CHANGELOG"
            echo ""
            echo "---"
            echo ""
            echo "$AUTO_NOTES"
          } > release_notes.md

      - name: Release erstellen
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mapfile -t ASSETS < assets.txt
          mapfile -t FOLDER_ASSETS < folder_assets.txt

          FLAGS=()
          if [ "${{ inputs.draft }}" = "true" ]; then
            FLAGS+=(--draft)
          fi
          if [ "${{ inputs.prerelease }}" = "true" ]; then
            FLAGS+=(--prerelease)
          fi

          gh release create "${{ steps.meta.outputs.tag_name }}" \
            "${ASSETS[@]}" \
            "${FOLDER_ASSETS[@]}" \
            --title "${{ steps.meta.outputs.project_name }} ${{ steps.meta.outputs.timestamp }}" \
            --notes-file "release_notes.md" \
            "${FLAGS[@]}"
